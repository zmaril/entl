logo = "site/public/duckling-mark.png"  # fleet dashboard logo
# housekeeper overrides — see github.com/zmaril/housekeeping
fleet = "zmaril/powderworks"

[checks]
# Fleet policy (zmaril/powderworks) requires conventional commits fleet-wide.
# Enforced via .github/workflows/conventional.yml (PR-title lint) plus a
# README mention, matching the fleet-canonical form.
conventional-commits = "required"

# stray-files.allow is locked by the fleet, so it can't be set per-repo now.
# Working docs live under notes/ (translation.md moved there); the canonical
# worklist file stays at the root.

[allow-auto-merge]
# Auto-merge is enabled on the repo so a green PR can land without a babysitter.
# The check asserts GitHub's allow_auto_merge matches this declaration.
enabled = true
