name: straitjacket
on:
  push:
    branches: [main]
  pull_request:

# security-events lets the action upload its SARIF to code scanning, so findings
# land as PR diff annotations (with both endpoints of each duplication clone).
permissions:
  contents: read
  security-events: write

jobs:
  straitjacket:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # Pinned, not @main/latest: a new straitjacket rule reaches this repo only
      # on a deliberate bump, not the moment it ships.
      - uses: zmaril/straitjacket@v0.2.3
        with:
          version: v0.2.3
