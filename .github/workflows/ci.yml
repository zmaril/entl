# entl CI: the Rust engine, all three bindings against their suites,
# the codegen-freshness gate (every generated artifact must match a fresh
# regeneration — stale codegen is a build failure, not a surprise), the Postgres
# leg of the testkit round-trips, and the executable-docs harness (every code
# block in the cookbook runs against a fixture repo).
#
# Path gating (the `changes` job below): docs-site edits don't touch the engine
# or the bindings, so a site-only PR skips the whole heavy matrix. The one
# exception is the executable-docs job — it runs the cookbook's code blocks, so
# it fires on engine changes AND on cookbook/example edits.
#
# straitjacket-allow-file:duplication — GitHub Actions has no include for job
# scaffolding, so the per-job checkout + rust-setup + `needs`/`if` path guard
# repeats across the matrix by design.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Decide which job families need to run for this diff. `code` = anything that
  # isn't the docs site, design notes, or loose markdown. `docs` = whatever the
  # executable-docs harness depends on (the engine/bindings it exercises, plus
  # the cookbook and the test file itself).
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!site/**'
              - '!notes/**'
              - '!**/*.md'
            docs:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'site/examples.test.ts'
              - 'site/content/docs/guides/cookbook.mdx'
              - '.github/workflows/ci.yml'
              # the docs job builds the CLI + bindings, so it depends on the
              # shared toolchain/cache setup too (rust-setup lives here)
              - '.github/actions/**'

  rust:
    name: rust (core + cli + testkit)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      # lint gates first (fmt is instant; clippy warms the test build below)
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      # default members: entl-core, entl-cli. The schema tool (fluessig) lives in
      # its own repo now; the codegen drift guard runs in the `node` job below
      # (regenerate via the external tool, fail if any committed artifact changed).
      - run: cargo test
      # the round-trip property tests (P1 store, P2 OID-exact, P3 forge)
      - run: cargo test -p entl-testkit

  node:
    name: node binding + codegen freshness
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: build the napi addon
        working-directory: crates/entl-node
        run: |
          bun install
          bun run build
      - name: bun test (PGlite e2e + coverage)
        working-directory: crates/entl-node
        run: bun test
      - name: codegen freshness — regenerate everything, fail on drift
        env:
          # The schema tool lives in its own repo; pin the ref entl generates
          # against. Bump this when adopting a new fluessig release.
          FLUESSIG_REF: main
        run: |
          # Clone into RUNNER_TEMP (outside the workspace) so it can't register
          # as drift in the git-clean check below.
          git clone --depth 1 --branch "$FLUESSIG_REF" \
            https://github.com/zmaril/fluessig "$RUNNER_TEMP/fluessig"
          export FLUESSIG_DIR="$RUNNER_TEMP/fluessig"
          (cd crates/entl-node && bun run gen)   # runs scripts/gen.sh against $FLUESSIG_DIR
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::generated artifacts are stale — run scripts/gen.sh and commit"
            git status --porcelain
            git diff | head -200
            exit 1
          fi

  python:
    name: python binding
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build + test
        working-directory: crates/entl-python
        run: |
          python -m venv .venv
          # deps live once in pyproject's [dependency-groups] (needs pip >= 25.1)
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet --group dev
          .venv/bin/maturin develop --quiet
          .venv/bin/python -m pytest tests/ -q

  ruby:
    name: ruby binding
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      # deps live once in crates/entl-ruby/Gemfile (bundler-cache runs bundle install)
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: crates/entl-ruby
          bundler-cache: true
      # rb_sys drives cargo through extconf/make; bindgen finds the runner's
      # libclang on its own (no LIBCLANG_PATH needed on ubuntu images).
      - name: build + test
        working-directory: crates/entl-ruby
        env:
          # Build into the workspace target dir so rust-cache covers the deps,
          # in the dev profile — CI tests don't need optimized code. Together
          # these turn the from-scratch release rebuild (~12 min) into an
          # incremental cached one.
          RB_SYS_CARGO_PROFILE: dev
          RB_SYS_CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: |
          bundle exec ruby extconf.rb
          make
          bundle exec ruby -I. -Itest test/test_entl.rb

  postgres:
    name: postgres sink (testkit round-trips)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: entl
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      # the same P1/P2/P3 properties as the rust job, but with the Postgres
      # sink included (ENTL_TEST_PG gates it; embedded stores always run)
      - run: cargo test -p entl-testkit
        env:
          ENTL_TEST_PG: postgres://postgres:pg@localhost:5432/entl

  docs:
    name: executable docs (cookbook blocks)
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # the harness skips when a prerequisite is missing, so build all three —
      # the CLI, the napi addon, and the python venv — before running it.
      - name: build the CLI (release)
        run: cargo build --release
      - name: build the napi addon
        working-directory: crates/entl-node
        run: |
          bun install
          bun run build
      - name: build the python addon
        working-directory: crates/entl-python
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet --group dev
          .venv/bin/maturin develop --quiet
      # examples.test.ts is dependency-free (bun:test + node builtins), so no
      # `bun install` in site/ — it would pull the whole docs toolchain for nothing.
      # The existence checks keep the harness's skip-when-unbuilt behavior from
      # turning a broken build step into a silently-green job.
      - name: run every cookbook code block
        working-directory: site
        run: |
          test -x ../target/release/entl
          test -f ../crates/entl-node/index.js
          test -x ../crates/entl-python/.venv/bin/python
          bun test examples.test.ts
