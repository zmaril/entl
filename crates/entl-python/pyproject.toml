[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "entl"
version = "0.0.0"
description = "The entl engine (git + GitHub -> your database) in Python."
requires-python = ">=3.9"
classifiers = [
  "Programming Language :: Rust",
  "Programming Language :: Python :: Implementation :: CPython",
]

[tool.ruff]
# python/entl/models.py is generated by fluessig from crates/entl-schema — the
# generator owns its formatting, so ruff must not touch it (a reformat here would
# drift from the generator and trip CI's codegen-freshness gate).
extend-exclude = ["python/entl/models.py"]
target-version = "py39"

[tool.maturin]
# Build the crate as a CPython extension module (stable ABI via abi3).
features = ["pyo3/extension-module"]
# Mixed layout: the Rust ext (`entl._entl`) + the pure-Python `python/entl/` package (models).
python-source = "python"
module-name = "entl._entl"

[project.optional-dependencies]
# The SQLAlchemy read-plane models (entl.models) need SQLAlchemy; the engine itself does not.
orm = ["sqlalchemy>=2.0"]
# Consuming the Arrow surfaces (ChangeBatch capsules / ipc(), query_arrow) needs an Arrow
# implementation on the CONSUMER side only — entl itself ships none (the PyCapsule
# interface is an ABI). This extra is a convenience for tests and notebooks.
arrow = ["pyarrow>=14"]

[dependency-groups]
# Everything the test suites + the docs harness need, declared ONCE (PEP 735).
# Install with `uv pip install --group dev` (or pip >= 25.1). Runtime deps stay
# empty by design — the engine is the compiled extension.
dev = ["maturin>=1.7,<2.0", "pytest", "pytest-cov", "ruff", "sqlalchemy>=2.0", "pyarrow>=14"]
